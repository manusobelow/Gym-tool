<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png" type="image/png">
<title>Gym Reference</title>
<style>
  html, body { margin:0; padding:0; background:#131313; }
</style>
</head>
<body>
<div id="gym-ref-root">Loading…</div>
<style>
  #gym-ref-root {
    --bg: #131313; --surface: #1d1d1d; --surface-2: #262626; --line: #333333;
    --chalk: #f2f0ea; --muted: #8f8c86; --brand: #c8362a; --steel: #5b84b8;
    --green: #6fae6f; --red: #7a3b34;
    background: var(--bg); color: var(--chalk);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 60px;
  }
  #gym-ref-root * { box-sizing: border-box; }
  .grr-header { padding: 16px 16px 10px; border-bottom: 3px solid var(--brand); position: sticky; top: 0; background: var(--bg); z-index: 30; display:flex; justify-content:space-between; align-items:center; }
  .grr-title { font-size: 20px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; margin:0; }
  .grr-title .grr-title-accent { color: var(--brand); }
  .grr-navbtn { font-size: 11px; font-weight:700; text-transform:uppercase; color: var(--steel); border:1px solid var(--steel); border-radius:999px; padding:5px 10px; cursor:pointer; background:none; }
  .grr-section-label { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); padding: 12px 16px 6px; font-weight: 700; }
  .grr-equip-row { display:flex; flex-wrap:wrap; gap:6px; padding: 0 16px 10px; }
  .grr-chip { border:1px solid var(--line); background:var(--surface); color:var(--muted); font-size:12px; font-weight:700; padding:6px 10px; border-radius:999px; cursor:pointer; user-select:none; white-space:nowrap; }
  .grr-chip.active { background:var(--brand); color:#fff; border-color:var(--brand); }
  .grr-chip-all.active { background:var(--steel); color:#fff; border-color:var(--steel); }
  .grr-list { padding: 4px 16px 8px; display:flex; flex-direction:column; gap:8px; }
  .grr-card { background:var(--surface); border:1px solid var(--line); border-left:4px solid var(--steel); border-radius:4px; padding:10px 12px; cursor:pointer; }
  .grr-card.main { border-left-color: var(--brand); }
  .grr-card-top { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .grr-card-name { font-weight:700; font-size:14.5px; }
  .grr-badge { font-size:9.5px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; padding:2px 6px; border-radius:3px; white-space:nowrap; background:var(--steel); color:#fff; }
  .grr-badge.main { background: var(--brand); color:#fff; }
  .grr-badge.mobility { background: #4a4a4a; }
  .grr-card-meta { font-size:11.5px; color:var(--muted); margin-top:3px; }
  .grr-card-tm { font-size:11px; color:var(--brand); margin-top:4px; font-weight:700; }
  .grr-empty { color:var(--muted); font-size:13px; padding:24px 16px; text-align:center; }
  .grr-collapse { margin:10px 16px 0; border:1px solid var(--line); border-radius:4px; background:var(--surface); overflow:hidden; }
  .grr-collapse-head { padding:12px; font-weight:700; font-size:13px; text-transform:uppercase; letter-spacing:.04em; display:flex; justify-content:space-between; cursor:pointer; color:var(--brand); }
  .grr-collapse-body { padding:0 12px 12px; font-size:12.5px; line-height:1.55; display:none; }
  .grr-collapse.open .grr-collapse-body { display:block; }
  .grr-collapse-body b { color:var(--brand); }
  .grr-row-pair { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--line); }
  .grr-row-pair:last-child { border-bottom:none; }

  .grr-detail { padding: 8px 16px 24px; }
  .grr-back { color: var(--steel); font-size:12px; font-weight:700; cursor:pointer; margin-bottom:10px; display:inline-block; }
  .grr-detail-name { font-size:20px; font-weight:800; }
  .grr-detail-meta { color:var(--muted); font-size:12.5px; margin-top:2px; margin-bottom:10px; }
  .grr-notes { background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:10px 12px; font-size:12.5px; color:var(--chalk); margin-bottom:12px; line-height:1.5; }
  .grr-gif { width:100%; border-radius:6px; margin-bottom:12px; display:block; background:var(--surface); }
  .grr-gif-frame { height:260px; border:1px solid var(--line); }
  .grr-gif-link { display:inline-block; margin-bottom:12px; color:var(--steel); font-size:12px; font-weight:700; }
  .grr-tm-box { background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  .grr-tm-box label { font-size:11px; text-transform:uppercase; color:var(--muted); font-weight:700; }
  .grr-tm-box input { width:80px; background:var(--bg); border:1px solid var(--line); color:var(--chalk); font-size:15px; padding:6px 8px; border-radius:4px; text-align:right; }
  .grr-timer-box { background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:14px 12px; margin-bottom:14px; text-align:center; }
  .grr-timer-time { font-size:34px; font-weight:800; letter-spacing:.02em; color:var(--chalk); font-variant-numeric:tabular-nums; }
  .grr-timer-bar { height:6px; background:var(--bg); border-radius:999px; overflow:hidden; margin:8px 0 10px; }
  .grr-timer-fill { height:100%; background:var(--brand); transition:width 1s linear; }
  .grr-timer-presets { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; margin-bottom:10px; }
  .grr-timer-chip { border:1px solid var(--line); background:var(--bg); color:var(--muted); font-size:11.5px; font-weight:700; padding:5px 9px; border-radius:999px; cursor:pointer; }
  .grr-timer-chip.active { background:var(--steel); border-color:var(--steel); color:#fff; }
  .grr-timer-btn { background:var(--steel); color:#fff; border:none; font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:.04em; padding:9px 24px; border-radius:6px; cursor:pointer; }
  .grr-set-row { background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
  .grr-set-row-top { display:flex; justify-content:space-between; font-size:12.5px; color:var(--muted); margin-bottom:6px; text-transform:uppercase; letter-spacing:.03em; font-weight:700;}
  .grr-set-inputs { display:flex; gap:8px; align-items:center; }
  .grr-set-inputs input { background:var(--bg); border:1px solid var(--line); color:var(--chalk); font-size:15px; padding:6px 8px; border-radius:4px; width:64px; text-align:center; }
  .grr-set-inputs .grr-unit { font-size:11px; color:var(--muted); }
  .grr-toggle { margin-left:auto; display:flex; gap:4px; }
  .grr-toggle button { border:1px solid var(--line); background:var(--bg); color:var(--muted); font-size:15px; width:36px; height:32px; border-radius:4px; cursor:pointer; }
  .grr-toggle button.on-yes { background:var(--green); color:#111; border-color:var(--green); }
  .grr-toggle button.on-no { background:var(--red); color:#111; border-color:var(--red); }
  .grr-save-btn { width:100%; background:var(--brand); color:#fff; border:none; font-weight:800; font-size:14px; text-transform:uppercase; letter-spacing:.04em; padding:12px; border-radius:6px; margin-top:6px; cursor:pointer; }
  .grr-save-msg { text-align:center; font-size:12px; color:var(--green); margin-top:8px; min-height:16px; }
  .grr-superset-box { margin-top:16px; }
  .grr-superset-chip { display:inline-block; background:var(--surface-2); border:1px solid var(--line); color:var(--chalk); font-size:12px; padding:5px 9px; border-radius:6px; margin:0 6px 6px 0; cursor:pointer; }
  .grr-superset-chip:active { background:var(--brand); border-color:var(--brand); color:#fff; }
  .grr-history { margin-top:16px; }
  .grr-history-row { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); padding:6px 0; border-bottom:1px solid var(--line); }
  .grr-history-row span:last-child { color:var(--chalk); }

  .grr-export-btn { width:100%; background:var(--steel); color:#fff; border:none; font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:.04em; padding:12px; border-radius:6px; cursor:pointer; margin-bottom:8px; }
  .grr-copy-btn { width:100%; background:var(--surface); color:var(--chalk); border:1px solid var(--line); font-weight:700; font-size:13px; padding:10px; border-radius:6px; cursor:pointer; margin-bottom:14px; }
  .grr-log-entry { background:var(--surface); border:1px solid var(--line); border-radius:6px; padding:10px 12px; margin-bottom:8px; }
  .grr-log-entry-top { display:flex; justify-content:space-between; font-weight:700; font-size:13px; }
  .grr-log-entry-meta { font-size:11.5px; color:var(--muted); margin-top:2px; }
</style>

<script src="exercises.js?v=2"></script>
<script>
(function() {
  const root = document.getElementById('gym-ref-root');

  if (typeof EXERCISES === 'undefined') {
    root.innerHTML = '<div style="padding:24px;color:#f2f0ea;font-family:sans-serif;">Could not load exercises.js — make sure it is uploaded in the same folder as this file.</div>';
    return;
  }

  const PATTERNS = ["Squat","Hinge","Lunge","Push Horizontal","Pull Horizontal","Push Vertical","Pull Vertical","Core / Carry","Isolation","Warm-up / Mobility","Conditioning"];
  const EQUIP = ["barbell","dumbbell","kettlebell","cable","machine","bodyweight","band","trapbar","landmine"];
  const EQUIP_LABEL = {barbell:"Barbell",dumbbell:"DB",kettlebell:"KB",cable:"Cable",machine:"Machine",bodyweight:"Bodyweight",band:"Band",trapbar:"Trap Bar",landmine:"Landmine"};
  const PAIR_MAP = {"Push Horizontal":"Pull Horizontal","Pull Horizontal":"Push Horizontal","Push Vertical":"Pull Vertical","Pull Vertical":"Push Vertical"};
  const NO_SUPERSET_PATTERNS = new Set(["Squat","Hinge","Lunge"]);

  const EX = EXERCISES;
  const EX_BY_ID = Object.fromEntries(EX.map(x => [x.id, x]));

  function targetsFor(x, tierState, hypState) {
    if (x.scheme === 'main') {
      const lastPct = (tierState === '85') ? 0.85 : 0.80;
      return [
        {label:'Warm-up', pct:0.50, reps:5},
        {label:'Set 1', pct:0.85, reps:6},
        {label:'Set 2', pct:0.85, reps:6},
        {label:'Set 3 (test set)', pct:lastPct, reps:6, isTestSet:true},
      ];
    }
    if (x.scheme === 'strength') return [
      {label:'Warm-up', pct:0.50, reps:5},
      {label:'Set 1', pct:0.85, reps:7},
      {label:'Set 2 (test set)', pct:0.85, reps:7, isTestSet:true},
    ];
    // hypertrophy
    const tier = (hypState && hypState.tier) || 8;
    const w = (hypState && hypState.weight) || null;
    return [
      {label:'Set 1 (to failure)', reps:tier, fixedWeight:w, isMainHypSet:true},
      {label:'Set 2 (to failure)', reps:tier, fixedWeight:w, isMainHypSet:true},
      {label:'Set 3 — drop weight (to failure)', reps:10, fixedWeight: w ? roundW(w*0.85) : null},
    ];
  }

  function roundW(w) { return Math.round(w/5)*5; }
  function friendlyDate(iso) {
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return iso;
    const wd = d.toLocaleDateString(undefined, {weekday:'short'});
    return `${wd} ${iso}`;
  }
  function todayLocal() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  }
  function newLogId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  // ---------- REST TIMER ----------
  let TIMER = { seconds: 120, total: 120, running: false, handle: null, exId: null };
  const TIMER_PRESETS = [60, 90, 120, 150, 180];

  function fmtTime(s) {
    s = Math.max(0, s);
    const m = Math.floor(s / 60), sec = s % 60;
    return `${m}:${String(sec).padStart(2,'0')}`;
  }
  function playBeep() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      o.start(); o.stop(ctx.currentTime + 0.35);
    } catch(e) {}
  }
  function timerTick() {
    TIMER.seconds--;
    const timeEl = document.getElementById('grr-timer-time');
    const fillEl = document.getElementById('grr-timer-fill');
    if (timeEl) timeEl.textContent = fmtTime(TIMER.seconds);
    if (fillEl) fillEl.style.width = Math.max(0, (TIMER.seconds / TIMER.total) * 100) + '%';
    if (TIMER.seconds <= 0) {
      clearInterval(TIMER.handle);
      TIMER.handle = null; TIMER.running = false;
      const btn = document.getElementById('grr-timer-startpause');
      if (btn) btn.textContent = 'Start';
      if (navigator.vibrate) navigator.vibrate([200,100,200]);
      playBeep();
    }
  }
  function setTimerDuration(sec, exId) {
    clearInterval(TIMER.handle);
    TIMER = {seconds:sec, total:sec, running:false, handle:null, exId};
    const timeEl = document.getElementById('grr-timer-time');
    const fillEl = document.getElementById('grr-timer-fill');
    const btn = document.getElementById('grr-timer-startpause');
    if (timeEl) timeEl.textContent = fmtTime(sec);
    if (fillEl) fillEl.style.width = '100%';
    if (btn) btn.textContent = 'Start';
  }
  function toggleTimer(exId, defaultSec) {
    if (TIMER.exId !== exId) setTimerDuration(defaultSec, exId);
    const btn = document.getElementById('grr-timer-startpause');
    if (TIMER.running) {
      clearInterval(TIMER.handle); TIMER.handle = null; TIMER.running = false;
      if (btn) btn.textContent = 'Start';
    } else {
      if (TIMER.seconds <= 0) TIMER.seconds = TIMER.total;
      TIMER.running = true;
      TIMER.handle = setInterval(timerTick, 1000);
      if (btn) btn.textContent = 'Pause';
    }
  }
  function timerBlock(x, defaultSec) {
    const isCurrent = TIMER.exId === x.id;
    const seconds = isCurrent ? TIMER.seconds : defaultSec;
    const total = isCurrent ? TIMER.total : defaultSec;
    const running = isCurrent && TIMER.running;
    return `
      <div class="grr-timer-box">
        <div class="grr-timer-time" id="grr-timer-time">${fmtTime(seconds)}</div>
        <div class="grr-timer-bar"><div class="grr-timer-fill" id="grr-timer-fill" style="width:${Math.max(0,(seconds/total)*100)}%"></div></div>
        <div class="grr-timer-presets" id="grr-timer-presets">
          ${TIMER_PRESETS.map(s => `<span class="grr-timer-chip${(isCurrent && TIMER.total===s) ? ' active' : ''}" data-sec="${s}">${fmtTime(s)}</span>`).join('')}
        </div>
        <button class="grr-timer-btn" id="grr-timer-startpause">${running ? 'Pause' : 'Start'}</button>
      </div>`;
  }
  function wireTimer(x, defaultSec) {
    document.getElementById('grr-timer-startpause').onclick = () => toggleTimer(x.id, defaultSec);
    document.querySelectorAll('.grr-timer-chip').forEach(chip => {
      chip.onclick = () => setTimerDuration(parseInt(chip.dataset.sec, 10), x.id);
    });
  }

  // ---------- STATE ----------
  let state = { equip: new Set(EQUIP), pattern: new Set(PATTERNS), view: 'list', activeId: null, saveMsg: '', logFilter: '' };
  let TM = {};
  let TIER = {};
  let HYP = {};
  let LOGS = {};

  function loadAll() {
    try { const a = JSON.parse(localStorage.getItem('gym-ref-equip')); if (a && a.length) state.equip = new Set(a); } catch(e){}
    try { const a = JSON.parse(localStorage.getItem('gym-ref-pattern')); if (a) state.pattern = new Set(a); } catch(e){}
    try { const v = JSON.parse(localStorage.getItem('gym-tm')); if (v) TM = v; } catch(e){}
    try { const v = JSON.parse(localStorage.getItem('gym-tier')); if (v) TIER = v; } catch(e){}
    try { const v = JSON.parse(localStorage.getItem('gym-hyp')); if (v) HYP = v; } catch(e){}
    Object.keys(HYP).forEach(id => {
      if (HYP[id].tier === '6-8') HYP[id].tier = 8;
      else if (HYP[id].tier === '8-10') HYP[id].tier = 10;
    });
    try { const v = JSON.parse(localStorage.getItem('gym-logs')); if (v) LOGS = v; } catch(e){}
    Object.keys(LOGS).forEach(exId => {
      (LOGS[exId] || []).forEach((e, i) => {
        if (!e.exId) e.exId = exId;
        if (!e.logId) e.logId = exId + '-' + i;
      });
    });
    render();
  }
  function saveEquip() { try { localStorage.setItem('gym-ref-equip', JSON.stringify([...state.equip])); } catch(e){} }
  function savePattern() { try { localStorage.setItem('gym-ref-pattern', JSON.stringify([...state.pattern])); } catch(e){} }
  function saveTM() { try { localStorage.setItem('gym-tm', JSON.stringify(TM)); } catch(e){} }
  function saveTier() { try { localStorage.setItem('gym-tier', JSON.stringify(TIER)); } catch(e){} }
  function saveHyp() { try { localStorage.setItem('gym-hyp', JSON.stringify(HYP)); } catch(e){} }
  function saveLogs() { try { localStorage.setItem('gym-logs', JSON.stringify(LOGS)); } catch(e){} }
  function deleteLogEntry(exId, logId) {
    if (!LOGS[exId]) return;
    LOGS[exId] = LOGS[exId].filter(e => e.logId !== logId);
    saveLogs();
  }

  function toggleEquip(e) { state.equip.has(e) ? state.equip.delete(e) : state.equip.add(e); saveEquip(); render(); }
  function setAllEquip(on) { state.equip = on ? new Set(EQUIP) : new Set(); saveEquip(); render(); }
  function togglePattern(p) { state.pattern.has(p) ? state.pattern.delete(p) : state.pattern.add(p); savePattern(); render(); }
  function setAllPatterns() { state.pattern = new Set(PATTERNS); savePattern(); render(); }
  function activePatterns() { return state.pattern.size ? state.pattern : new Set(PATTERNS); }

  function supersetSuggestions(x) {
    if (NO_SUPERSET_PATTERNS.has(x.p)) return {note:"Best done alone — don't superset squat/hinge/lunge main work.", list:[]};
    const targetPattern = PAIR_MAP[x.p] || x.p;
    const list = EX.filter(o => o.id !== x.id && o.p === targetPattern && o.scheme !== 'mobility' && o.eq.some(e => state.equip.has(e))).slice(0,5);
    return {note: null, list};
  }

  function gifBlock(x) {
    if (!x.gif) return '';
    const driveMatch = x.gif.match(/drive\.google\.com\/file\/d\/([^\/]+)/);
    if (driveMatch) {
      const fileId = driveMatch[1];
      return `<iframe class="grr-gif grr-gif-frame" src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" loading="lazy"></iframe>`;
    }
    return `<img class="grr-gif" src="${x.gif}" alt="${x.n} demo" loading="lazy" onerror="this.style.display='none'"/>`;
  }

  // ---------- RENDER: LIST VIEW ----------
  function renderList() {
    const pats = activePatterns();
    root.innerHTML = `
      <div class="grr-header">
        <div class="grr-title">GYM <span class="grr-title-accent">REFERENCE</span></div>
        <button class="grr-navbtn" id="grr-goto-history">Log / Export</button>
      </div>
      <div class="grr-section-label">Equipment here today</div>
      <div class="grr-equip-row" id="grr-equip-row">
        <div class="grr-chip grr-chip-all" data-all="1">ALL</div>
        <div class="grr-chip grr-chip-all" data-none="1">NONE</div>
      </div>
      <div class="grr-section-label">Movement pattern</div>
      <div class="grr-equip-row" id="grr-pattern-row">
        <div class="grr-chip grr-chip-all" data-pall="1">ALL</div>
      </div>
      <div class="grr-list" id="grr-list"></div>
      <div class="grr-collapse" id="grr-superset">
        <div class="grr-collapse-head">Superset pairing guide ▾</div>
        <div class="grr-collapse-body">
          <div class="grr-row-pair"><span>Horizontal Push</span><span>↔ Horizontal Pull</span></div>
          <div class="grr-row-pair"><span>Vertical Push</span><span>↔ Vertical Pull</span></div>
          <div class="grr-row-pair"><span>DB / EZ Curl</span><span>↔ Triceps Pushdown</span></div>
          <div class="grr-row-pair"><span>Face Pull</span><span>↔ Pallof Press</span></div>
          <br/><b>Avoid supersetting:</b> Squat+Deadlift, Squat+Lunge, Deadlift+Heavy Row, Bench+OHP, Pull-ups+Lat Pulldown
        </div>
      </div>
      <div class="grr-collapse" id="grr-template">
        <div class="grr-collapse-head">Workout A / B template ▾</div>
        <div class="grr-collapse-body">
          <b>Workout A</b> — Squat + Horizontal Push + Vertical Pull + Core<br/>
          <b>Workout B</b> — Hinge/Lunge + Horizontal Pull + Vertical Push + Core<br/><br/>
          Alternate A/B each session. Don't stack both vertical push and vertical pull in one workout.
        </div>
      </div>
      <div class="grr-collapse" id="grr-scheme">
        <div class="grr-collapse-head">Scheme reference ▾</div>
        <div class="grr-collapse-body">
          <b>Strength — 2–3 min rest.</b> Warm-up 5@50%, Set 1 6@85%, Set 2 6@85%. Major lifts add a 3rd (test) set: starts at 80%, moves to 85% next session once hit. Hit the test set at 85% → your 1RM goes up (+5 lb lower body, +2.5 lb upper body), test set resets to 80%.<br/><br/>
          <b>Major lifts:</b> Squat, Deadlift, BB Bench Press / JM Press, BB Overhead Press, Weighted Pull-up, Barbell Row, Hip Thrust, Lunge Carries.<br/><br/>
          <b>Hypertrophy — 1 min rest, drop set.</b> Sets 1–2 to failure, target starts at 8 reps. Set 3 drops the weight, targets 10 reps to failure. Hit sets 1–2 at 8 → next session the target becomes 10 at the same weight. Hit 10 → add weight, target resets to 8.<br/><br/>
          <b>Mobility/Warm-up.</b> No weight tracked — just marked done for the day.
        </div>
      </div>
    `;

    const eqRow = root.querySelector('#grr-equip-row');
    EQUIP.forEach(e => {
      const chip = document.createElement('div');
      chip.className = 'grr-chip' + (state.equip.has(e) ? ' active' : '');
      chip.textContent = EQUIP_LABEL[e];
      chip.onclick = () => toggleEquip(e);
      eqRow.appendChild(chip);
    });
    eqRow.querySelector('[data-all]').onclick = () => setAllEquip(true);
    eqRow.querySelector('[data-none]').onclick = () => setAllEquip(false);

    const patRow = root.querySelector('#grr-pattern-row');
    PATTERNS.forEach(p => {
      const chip = document.createElement('div');
      chip.className = 'grr-chip' + (pats.has(p) ? ' active' : '');
      chip.textContent = p;
      chip.onclick = () => togglePattern(p);
      patRow.appendChild(chip);
    });
    patRow.querySelector('[data-pall]').onclick = () => setAllPatterns();

    const list = root.querySelector('#grr-list');
    list.innerHTML = '';
    let anyShown = false;
    PATTERNS.filter(p => pats.has(p)).forEach(p => {
      const group = EX.filter(x => x.p === p && x.eq.some(e => state.equip.has(e)));
      if (!group.length) return;
      anyShown = true;
      group.sort((a,b) => (a.scheme === b.scheme ? 0 : a.scheme === 'main' ? -1 : 1));
      const header = document.createElement('div');
      header.className = 'grr-section-label';
      header.style.padding = '10px 0 4px';
      header.textContent = p;
      list.appendChild(header);
      group.forEach(x => {
        const card = document.createElement('div');
        card.className = 'grr-card ' + x.scheme;
        const schemeLabel = {main:'Major Lift', strength:'Strength', hypertrophy:'Hypertrophy', mobility:'Mobility'}[x.scheme];
        const badgeClass = x.scheme === 'main' ? 'main' : x.scheme === 'mobility' ? 'mobility' : '';
        const tmLine = (x.scheme !== 'hypertrophy' && x.scheme !== 'mobility' && TM[x.id]) ? `<div class="grr-card-tm">1RM: ${TM[x.id]} lb</div>` : '';
        card.innerHTML = `
          <div class="grr-card-top">
            <div class="grr-card-name">${x.n}</div>
            <div class="grr-badge ${badgeClass}">${schemeLabel}</div>
          </div>
          <div class="grr-card-meta">${x.m}</div>
          ${tmLine}
        `;
        card.onclick = () => { state.view = 'detail'; state.activeId = x.id; state.saveMsg=''; render(); };
        list.appendChild(card);
      });
    });
    if (!anyShown) list.innerHTML = `<div class="grr-empty">No matches with the equipment selected.</div>`;

    ['grr-superset','grr-template','grr-scheme'].forEach(id => {
      const el = root.querySelector('#' + id);
      el.querySelector('.grr-collapse-head').onclick = () => el.classList.toggle('open');
    });
    root.querySelector('#grr-goto-history').onclick = () => { state.view = 'log'; render(); };
  }

  // ---------- RENDER: DETAIL VIEW (mobility) ----------
  function renderMobilityDetail(x) {
    const hist = (LOGS[x.id] || []).slice(-6).reverse();
    const histHtml = hist.length ? hist.map(l => `<div class="grr-history-row"><span>${friendlyDate(l.date)}</span><span>✅ Done</span></div>`).join('')
      : `<div style="color:var(--muted);font-size:12px;">Not logged yet.</div>`;

    root.innerHTML = `
      <div class="grr-detail">
        <span class="grr-back" id="grr-back">← Back to list</span>
        <div class="grr-detail-name">${x.n}</div>
        <div class="grr-detail-meta">${x.p} · ${x.m}</div>
        ${gifBlock(x)}
        ${x.notes ? `<div class="grr-notes">${x.notes}</div>` : ''}
        <button class="grr-save-btn" id="grr-save">Mark Done Today</button>
        <div class="grr-save-msg">${state.saveMsg}</div>
        <div class="grr-section-label" style="padding-left:0;">Recent history</div>
        <div class="grr-history">${histHtml}</div>
      </div>
    `;
    root.querySelector('#grr-back').onclick = () => { state.view = 'list'; render(); };
    root.querySelector('#grr-save').onclick = () => {
      const entry = {date: todayLocal(), exercise: x.n, pattern: x.p, exId: x.id, logId: newLogId(), sets:[{target:'Done', weight:null, reps:null, success:true}], allSuccess:true, tmAction:'none'};
      if (!LOGS[x.id]) LOGS[x.id] = [];
      LOGS[x.id].push(entry);
      saveLogs();
      state.saveMsg = 'Marked done for today.';
      render();
    };
  }

  // ---------- RENDER: DETAIL VIEW ----------
  function renderDetail() {
    const x = EX_BY_ID[state.activeId];
    if (x.scheme === 'mobility') { renderMobilityDetail(x); return; }

    const tm = TM[x.id] || null;
    const tierState = TIER[x.id] || '80';
    const hypState = HYP[x.id] || {weight: null, tier: 8};
    const targets = targetsFor(x, tierState, hypState);
    const ss = supersetSuggestions(x);
    const hist = (LOGS[x.id] || []).slice(-5).reverse();

    let setsHtml = targets.map((t,i) => {
      let weightGuess = '';
      if (t.pct) weightGuess = tm ? roundW(tm * t.pct) : '';
      if (t.fixedWeight !== undefined) weightGuess = t.fixedWeight || '';
      const pctLabel = t.pct ? Math.round(t.pct*100)+'% · ' : '';
      return `
        <div class="grr-set-row" data-i="${i}">
          <div class="grr-set-row-top"><span>${t.label}</span><span>${pctLabel}${t.reps} reps</span></div>
          <div class="grr-set-inputs">
            <input type="number" class="grr-weight-input" placeholder="lb" value="${weightGuess}"/>
            <span class="grr-unit">lb</span>
            <input type="number" class="grr-reps-input" placeholder="reps" value="${typeof t.reps === 'number' ? t.reps : ''}"/>
            <span class="grr-unit">reps</span>
            <div class="grr-toggle">
              <button class="grr-yes" data-i="${i}">✓</button>
              <button class="grr-no" data-i="${i}">✗</button>
            </div>
          </div>
        </div>`;
    }).join('');

    let ssHtml = '';
    if (ss.note) ssHtml = `<div class="grr-collapse-body" style="display:block;padding:0;color:var(--muted)">${ss.note}</div>`;
    else if (ss.list.length) ssHtml = ss.list.map(o => `<span class="grr-superset-chip" data-id="${o.id}">${o.n}</span>`).join('');
    else ssHtml = `<div style="color:var(--muted);font-size:12px;">No matching partner exercise with current equipment.</div>`;

    let histHtml = hist.length ? hist.map(l => `
      <div class="grr-history-row"><span>${friendlyDate(l.date)}</span><span>${l.sets.map(s=>s.success?'✅':'❌').join('')} ${l.tmAction==='increase'?'⬆️':''}</span></div>
    `).join('') : `<div style="color:var(--muted);font-size:12px;">No sessions logged yet.</div>`;

    root.innerHTML = `
      <div class="grr-detail">
        <span class="grr-back" id="grr-back">← Back to list</span>
        <div class="grr-detail-name">${x.n}</div>
        <div class="grr-detail-meta">${x.p} · ${x.m}</div>
        ${gifBlock(x)}
        ${x.notes ? `<div class="grr-notes">${x.notes}</div>` : ''}

        ${x.scheme !== 'hypertrophy' ? `
        <div class="grr-tm-box">
          <div>
            <label>1RM</label>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${x.scheme==='main' ? `Test set currently at ${tierState}%` : 'Rest 2–3 min between sets'}</div>
          </div>
          <input type="number" id="grr-tm-input" value="${tm || ''}" placeholder="e.g. 135"/>
        </div>` : `
        <div class="grr-tm-box">
          <div>
            <label>Working Weight</label>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">Rep target currently ${hypState.tier} reps · rest 1 min</div>
          </div>
          <input type="number" id="grr-hyp-weight-input" value="${hypState.weight || ''}" placeholder="e.g. 40"/>
        </div>`}

        ${timerBlock(x, x.scheme === 'hypertrophy' ? 60 : 120)}

        <div id="grr-sets">${setsHtml}</div>
        <button class="grr-save-btn" id="grr-save">Save Today's Log</button>
        <div class="grr-save-msg">${state.saveMsg}</div>

        <div class="grr-section-label" style="padding-left:0;">Goes well with</div>
        <div class="grr-superset-box">${ssHtml}</div>

        <div class="grr-section-label" style="padding-left:0;">Recent history</div>
        <div class="grr-history">${histHtml}</div>
      </div>
    `;

    root.querySelector('#grr-back').onclick = () => { state.view = 'list'; render(); };
    wireTimer(x, x.scheme === 'hypertrophy' ? 60 : 120);
    root.querySelectorAll('.grr-superset-chip').forEach(chip => {
      chip.onclick = () => { state.view = 'detail'; state.activeId = chip.dataset.id; state.saveMsg = ''; render(); };
    });
    if (x.scheme !== 'hypertrophy') {
      root.querySelector('#grr-tm-input').onchange = (e) => {
        const v = parseFloat(e.target.value);
        if (!isNaN(v) && v > 0) { TM[x.id] = v; saveTM(); render(); }
      };
    } else {
      root.querySelector('#grr-hyp-weight-input').onchange = (e) => {
        const v = parseFloat(e.target.value);
        if (!isNaN(v) && v > 0) { HYP[x.id] = {weight: v, tier: hypState.tier}; saveHyp(); render(); }
      };
    }
    root.querySelectorAll('.grr-yes').forEach(b => b.onclick = () => {
      b.classList.add('on-yes'); b.parentElement.querySelector('.grr-no').classList.remove('on-no');
    });
    root.querySelectorAll('.grr-no').forEach(b => b.onclick = () => {
      b.classList.add('on-no'); b.parentElement.querySelector('.grr-yes').classList.remove('on-yes');
    });

    root.querySelector('#grr-save').onclick = () => {
      const rows = root.querySelectorAll('.grr-set-row');
      const sets = [];
      rows.forEach((row, i) => {
        const w = parseFloat(row.querySelector('.grr-weight-input').value) || null;
        const r = parseFloat(row.querySelector('.grr-reps-input').value) || null;
        const success = row.querySelector('.grr-yes').classList.contains('on-yes');
        sets.push({target: targets[i].label, weight: w, reps: r, success});
      });
      let msg = 'Saved.';

      if (x.scheme === 'main' && tm) {
        const testSetIdx = targets.findIndex(t => t.isTestSet);
        const testOK = sets[testSetIdx] && sets[testSetIdx].success;
        if (testOK) {
          if (tierState === '80') {
            TIER[x.id] = '85'; saveTier();
            msg = 'Saved. Test set hit at 80% — next session it moves to 85%.';
          } else {
            const inc = x.region === 'lower' ? 5 : 2.5;
            TM[x.id] = tm + inc; TIER[x.id] = '80';
            saveTM(); saveTier();
            msg = `Saved. Test set hit at 85% — 1RM bumped to ${TM[x.id]} lb, test set resets to 80%.`;
          }
        }
      } else if (x.scheme === 'strength' && tm) {
        const testSetIdx = targets.findIndex(t => t.isTestSet);
        const testOK = sets[testSetIdx] && sets[testSetIdx].success;
        if (testOK) {
          const inc = x.region === 'lower' ? 5 : 2.5;
          TM[x.id] = tm + inc; saveTM();
          msg = `Saved. Both sets hit — 1RM bumped to ${TM[x.id]} lb.`;
        }
      } else if (x.scheme === 'hypertrophy') {
        const mainHypIdx = targets.map((t,i)=>t.isMainHypSet?i:-1).filter(i=>i>=0);
        const mainHypOK = mainHypIdx.length && mainHypIdx.every(i => sets[i] && sets[i].success);
        if (mainHypOK && hypState.weight) {
          if (hypState.tier === 8) {
            HYP[x.id] = {weight: hypState.weight, tier: 10}; saveHyp();
            msg = 'Saved. Sets 1-2 complete — rep target moves to 10 next session.';
          } else {
            const inc = x.region === 'lower' ? 5 : 2.5;
            HYP[x.id] = {weight: hypState.weight + inc, tier: 8}; saveHyp();
            msg = `Saved. Hit 10 reps — weight bumped to ${HYP[x.id].weight} lb, rep target resets to 8.`;
          }
        }
      }

      const entry = {date: todayLocal(), exercise: x.n, pattern: x.p, exId: x.id, logId: newLogId(), sets, allSuccess: sets.every(s=>s.success), tmAction: msg.includes('bumped') ? 'increase' : 'none'};
      if (!LOGS[x.id]) LOGS[x.id] = [];
      LOGS[x.id].push(entry);
      saveLogs();
      state.saveMsg = msg;
      render();
    };
  }

  // ---------- RENDER: LOG / EXPORT VIEW ----------
  function toCSV(entries) {
    const rows = [];
    entries.sort((a,b)=>a.date.localeCompare(b.date)).forEach(entry => {
      const exObj = EX.find(x => x.n === entry.exercise);
      const isBodyweightOnly = exObj && exObj.eq.length === 1 && exObj.eq[0] === 'bodyweight';
      const isMobility = exObj && exObj.scheme === 'mobility';
      entry.sets.forEach(s => {
        let weight, reps;
        if (isMobility) {
          weight = 'BW/time';
          reps = 'Done';
        } else {
          const hasWeight = s.weight !== null && s.weight !== undefined && s.weight !== '';
          weight = hasWeight ? s.weight : (isBodyweightOnly ? 'BW' : '');
          reps = (s.reps !== null && s.reps !== undefined && s.reps !== '') ? s.reps : '';
        }
        rows.push([entry.date, entry.exercise, weight, reps]);
      });
    });
    return rows.map(r => r.join('\t')).join('\n');
  }

  function renderLog() {
    const allEntries = Object.values(LOGS).flat().sort((a,b) => b.date.localeCompare(a.date));

    root.innerHTML = `
      <div class="grr-detail">
        <span class="grr-back" id="grr-back">← Back to list</span>
        <div class="grr-detail-name">Log &amp; Export</div>
        <div class="grr-detail-meta">${allEntries.length} sessions logged</div>
        <input type="text" id="grr-log-filter" placeholder="Filter by exercise name…" value="${state.logFilter}"
          style="width:100%;background:var(--surface);border:1px solid var(--line);color:var(--chalk);font-size:14px;padding:9px 10px;border-radius:6px;margin-bottom:10px;box-sizing:border-box;"/>
        <button class="grr-export-btn" id="grr-download">Download CSV (all)</button>
        <button class="grr-copy-btn" id="grr-copy">Copy CSV to clipboard</button>
        <div class="grr-save-msg" id="grr-log-msg"></div>
        <div id="grr-entries"></div>
      </div>
    `;
    root.querySelector('#grr-back').onclick = () => { state.view = 'list'; render(); };

    function currentFiltered() {
      const filterText = state.logFilter.trim().toLowerCase();
      return filterText ? allEntries.filter(e => e.exercise.toLowerCase().includes(filterText)) : allEntries;
    }

    function refreshEntries() {
      const filterText = state.logFilter.trim().toLowerCase();
      const filtered = currentFiltered();
      root.querySelector('#grr-copy').textContent = filterText
        ? `Copy CSV to clipboard (${filtered.length} matching)`
        : `Copy CSV to clipboard (all ${allEntries.length})`;

      const container = root.querySelector('#grr-entries');
      container.innerHTML = '';
      if (!filtered.length) {
        container.innerHTML = `<div class="grr-empty">${allEntries.length ? 'No sessions match that filter.' : 'No sessions logged yet — log a set from any exercise page.'}</div>`;
        return;
      }
      filtered.forEach(e => {
        const div = document.createElement('div');
        div.className = 'grr-log-entry';
        div.innerHTML = `
          <div class="grr-log-entry-top">
            <span>${e.exercise}</span>
            <span style="display:flex;align-items:center;gap:8px;">${friendlyDate(e.date)} <span class="grr-log-delete" data-exid="${e.exId||''}" data-logid="${e.logId||''}" style="cursor:pointer;color:var(--red);font-weight:800;">✕</span></span>
          </div>
          <div class="grr-log-entry-meta">${e.pattern} · ${e.sets.map(s=>s.success?'✅':'❌').join('')} ${e.tmAction==='increase' ? '· TM increased' : ''}</div>
        `;
        container.appendChild(div);
      });
      container.querySelectorAll('.grr-log-delete').forEach(btn => {
        btn.onclick = () => {
          const exId = btn.dataset.exid, logId = btn.dataset.logid;
          if (!exId || !logId) { root.querySelector('#grr-log-msg').textContent = "Can't delete this entry (older format)."; return; }
          if (confirm('Delete this logged session? This cannot be undone.')) {
            deleteLogEntry(exId, logId);
            state.view = 'log'; render();
          }
        };
      });
    }

    root.querySelector('#grr-log-filter').oninput = (e) => { state.logFilter = e.target.value; refreshEntries(); };
    refreshEntries();

    root.querySelector('#grr-download').onclick = () => {
      try {
        const blob = new Blob([toCSV(allEntries)], {type:'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'gym-log.csv';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        root.querySelector('#grr-log-msg').textContent = 'Downloaded full history.';
      } catch (err) {
        root.querySelector('#grr-log-msg').textContent = 'Download blocked here — try Copy instead.';
      }
    };
    root.querySelector('#grr-copy').onclick = async () => {
      const filtered = currentFiltered();
      const filterText = state.logFilter.trim();
      try {
        await navigator.clipboard.writeText(toCSV(filtered));
        root.querySelector('#grr-log-msg').textContent = filterText
          ? `Copied ${filtered.length} session(s) for "${filterText}".`
          : 'Copied everything — paste into a Sheet or Notes.';
      } catch (err) {
        root.querySelector('#grr-log-msg').textContent = 'Copy failed in this browser.';
      }
    };
  }

  function render() {
    if (state.view === 'detail') renderDetail();
    else if (state.view === 'log') renderLog();
    else renderList();
  }

  loadAll();
})();
</script>
</body>
</html>
